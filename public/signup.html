<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - QR Food Ordering</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Register Your Restaurant</h2>
      <div class="error-msg" id="errorMsg"></div>
      <form id="signupForm">
        <label>Restaurant / Shop Name</label>
        <input type="text" id="name" required placeholder="e.g. Spice Garden Cafe">

        <label>Email</label>
        <input type="email" id="email" required placeholder="owner@example.com">

        <label>Address (optional)</label>
        <input type="text" id="address" placeholder="Shop address">

        <label>Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">

        <button class="btn btn-block" type="submit">Create Account</button>
      </form>
      <div class="switch-link">Already have an account? <a href="/login.html">Login here</a></div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Signup failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('shop', JSON.stringify(data.shop));
        window.location.href = '/admin.html';
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
